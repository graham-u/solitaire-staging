<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d7a3a">
  <title>Solitaire</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="status-bar">
    <div class="stat">Score: <span id="score">0</span></div>
    <div class="stat">Time: <span id="time">0:00</span></div>
    <div class="stat">Moves: <span id="moves">0</span></div>
  </header>

  <div id="play-area">
    <div id="top-row"></div>
    <div id="tableau"></div>
  </div>

  <nav id="action-bar">
    <button id="btn-new-game">New Game</button>
    <button id="btn-hint">Hint</button>
    <button id="btn-undo" disabled>Undo</button>
  </nav>

  <div id="version">v23</div>

  <div id="win-overlay" class="hidden">
    <div id="win-dialog">
      <h1>You Win!</h1>
      <p id="win-score"></p>
      <p id="win-time"></p>
      <p id="win-moves"></p>
      <button id="btn-win-new-game">New Game</button>
    </div>
  </div>

  <div id="unwinnable-overlay" class="hidden">
    <div id="unwinnable-dialog">
      <h1>Game Over</h1>
      <p>It looks like this game can't be won.</p>
      <button id="btn-unwinnable-new-game">Start a new game?</button>
    </div>
  </div>

  <div id="hint-overlay" class="hidden">
    <div id="hint-dialog">
      <div class="hint-spinner"></div>
      <p>Finding the best move…</p>
      <button id="btn-hint-cancel">Cancel</button>
    </div>
  </div>

  <div id="hint-nopath-overlay" class="hidden">
    <div id="hint-nopath-dialog">
      <p>This position is tricky — I couldn't find a clear next move in the time I had. Try making a move yourself, and I'll try again next time.</p>
      <button id="btn-hint-nopath-ok">OK</button>
    </div>
  </div>

  <div id="confirm-overlay" class="hidden">
    <div id="confirm-dialog">
      <p>Start a new game?</p>
      <div class="confirm-buttons">
        <button id="btn-confirm-yes">Yes</button>
        <button id="btn-confirm-no">No</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      // updateViaCache: 'none' forces the browser to always fetch sw.js from the
      // network when checking for updates. Without this, a stale sw.js can sit
      // in the HTTP cache for up to 24 h and the new service worker never
      // installs — leading to situations where index.html updates but the
      // subresources it depends on stay on the previous version.
      navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then((reg) => {
        reg.update();
      });
      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (hadController && !refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
