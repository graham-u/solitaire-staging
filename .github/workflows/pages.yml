name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply staging branding
        if: github.repository == 'graham-u/solitaire-staging'
        run: |
          # Manifest: orange theme, "(Dev)" name
          sed -i 's/"theme_color": "#2d7a3a"/"theme_color": "#c97b1a"/' manifest.json
          sed -i 's/"background_color": "#2d7a3a"/"background_color": "#c97b1a"/' manifest.json
          sed -i 's/"name": "Solitaire"/"name": "Solitaire (Dev)"/' manifest.json
          sed -i 's/"short_name": "Solitaire"/"short_name": "Solitaire Dev"/' manifest.json
          # HTML title
          sed -i 's/<title>Solitaire<\/title>/<title>Solitaire (Dev)<\/title>/' index.html
          # CSS: green→orange gradient
          sed -i 's/#3a9e4a/#c9941a/' style.css
          sed -i 's/#2d7a3a/#c97b1a/g' style.css
          sed -i 's/#1e5c28/#8a5510/' style.css
          # Icon: green→orange background
          sed -i 's/fill="#2d7a3a"/fill="#c97b1a"/' icon.svg

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
